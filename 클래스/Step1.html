<!DOCTYPE html>

<body>
    <script>
       class Rectangle {
            constructor(width, height) {
                this.width = width;
                this.height = height;
            }
            getperimeter() {
                return 2 * (this.width + this.height);
            }
            getArea() {
                return this.width * this.height;
            }
            
       }
       const retangle= new Rectangle(5, 10);
            console.log("사각형의 둘래:  " + retangle.getperimeter());
            console.log("사각형의 넓이: " + retangle.getArea());

    </script>
</body>
</html>
