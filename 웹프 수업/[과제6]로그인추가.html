<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //사용자에게 "로그인 하시겠습니까?" 확인창을 띄우고, 
        // [확인]-> "로그인을 진행합니다." / [취소]-> "로그인을 취소했습니다." 
        // 를 출력하는 프로그램을 작성하세요.

        const login = confirm("로그인 하시겠습니까?");
        if(login){
            alert("로그인을 진행합니다.");
        } else {
            alert("로그인을 취소했습니다.");
        }
    </script>
</body>
</html>
