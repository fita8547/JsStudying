<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        const array = ["string", true, function() { console.log("안녕"); }, { 이름: "소마고", 나이: "18" }, [273, 180]];
        array.push("추가된 요소");
        console.log(array);
        array.pop();
        console.log(array);

        //배열 array의 자료형의 종류는?
        console.log(array.length);

        //배열내에 함수를 실행하려면?
        array[2]();
        //배열내에 객체에서 소마고로 접근하려면
        console.log(array[3].이름);

        //array[array.length - 1] -> 배열의 마지막 요소
        console.log(array[array.length - 1]);

        //배열의 splice
        console.log(array.splice(1, 2)); //1번 인덱스부터 2개의 요소를 제거


        let array2 = [1, 2, 3, 4, 5];
        let array3 = [...array2, 6, 7, 8, 9];
        //구구단 계산
        let dan = Number(prompt("구구단을 입력하세요"));
        let result = [];
        for(let i =1 ; i<= 9 ; i++){
            result.push(`${dan} x ${i} = ${dan * i}`);
        }
        console.log(result);
    </script>
</body>
</html>
