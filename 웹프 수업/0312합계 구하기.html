<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let a = Number(prompt("숫자를 입력하세요"));
        let  b = 0;

        for (let i=1; i<=a ; i++){
            b += i;
        }
        alert(`1부터 ${a}까지의 합은 ${b}입니다.`);

    </script>
</body>
</html>
