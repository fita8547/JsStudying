<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>

        const primeNumbers = [];
        while(primeNumbers.length < 5){
            const number = Number(prompt("정수를 입력해주세요"));
            if(number <= 1){
                alert("음수나 1은 무시됩니다.");
                continue;
            }
            let isPrime = true;
            for(let i = 2; i <= Math.sqrt(number); i++){
                if(number % i === 0){
                    isPrime = false;
                    break;
                }
            }
            if(isPrime){
                primeNumbers.push(number);
            } else {
                alert("소수가 아닙니다. 무시됩니다.");
            }
        }
        //sum 계산은 reduce 함수로 acc는 누적값, cur는 현재값, 초기값은 0 으로 설정할
        const sum = primeNumbers.reduce((acc, cur) => acc + cur, 0);

        alert(`수집된 소수: ${primeNumbers.join(", ")}\n합계: ${sum}`);
    </script>
</body>
</html>
