<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //현재 시간을 hour 변수에 저장하고, 
        // 현재 시간이 12시 이전이면 "오전",
        //  12시 이후이면 "오후"를 출력하는 프로그램을 작성하세요. 

        const date = new Date();
        const hour = date.getHours();
        if(hour < 12){
            alert("오전입니다.");
        } else {
            alert("오후입니다.");
        }
    </script>
</body>
</html>
