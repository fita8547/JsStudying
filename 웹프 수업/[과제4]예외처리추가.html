<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        const month = Number(prompt("월을 입력해주세요"));
        switch (true) {
            case month >= 3 && month <= 5:
                alert("봄입니다.");
                break;
            case month >= 6 && month <= 8:
                alert("여름입니다.");
                break;
            case month >= 9 && month <= 11:
                alert("가을입니다.");
                break;
            default:
                alert("겨울입니다.");
        }
    </script>
</body>
</html>
