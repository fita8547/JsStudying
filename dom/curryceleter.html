<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            for (const element of document.querySelectorAll('input')){
                element.style.backgroundColor = 'red';
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            const header1= document.getElementById('textContents');
            const header2= document.getElementById('innerHTML');

            // 어떤 값을 조작한다는 것은,
            //1.값을 추출한다.
            header1.textContent = 'textContent 속성으로 변경된 문자열';

            // innerHTML 속성 사용
            header2.innerHTML = 'innerHTML 속성으로 변경된 문자열`';
        });
    </script>
</head>
<body>
    <h1 id = "header" class="center.head">안녕하세요!</h1>
    <input type="text">
    <input>

    <h1 id = "textContents">textContents 속성 기존 문자열</h1>
    <h1 id = "innerHTML">innerHTML 속성 기존 문자열</h1>
    
</body>
</html>
