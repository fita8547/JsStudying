<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //악명함수를 변쉥 할당
        const sayHello = function(n){
           for (let i = 0; i < n; i++){
               console.log(i+"번쨰 안녕하세요!");
           }
        };
        n = prompt('인사 횟수를 입력하세요.');
        sayHello(n);
    </script>
</body>
</html>
