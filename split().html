<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        const input = prompt("태어난 해를 입력해주세요");
        const year = Number(input);
        let tti = ["원숭이", "닭", "개", "돼지", "쥐", "소", "호랑이", "토끼", "용", "뱀", "말", "양"];
        alert(tti[0]);
        tti = ["원숭이", "닭", "개", "돼지", "쥐", "소", "호랑이", "토끼", "용", "뱀", "말", "양"].split();
        alert(tti[0]);  
        alert(`${year}년은 ${tti[year % 12]}띠입니다.`);

    </script>
</body>
</html>
